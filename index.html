<!DOCTYPE html>
<html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pokemondle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>


<body class="container-fluid d-flex row justify-content-center">

    <div class="container-fluid d-flex row justify-content-center"> <!-- Titre-->
        <img src="Images/logo.png" class="img-fluid w-50 p-3" alt="">
    </div>

    <div class="container-fluid d-flex row justify-content-center"> <!-- Input le pokemon guess -->
        <input type="text" class="w-25" placeholder="Write a name" id="in">
        <button type="button" class="w-25" onclick="getPoke();">Send</button>
    </div>

    <div class="container-fluid d-flex justify-content-around" style="padding-top: 5%;">
        <!-- Info sur le guess en cours -->
        <h5 class="text-decoration-underline">sprite</h5>
        <h5 class="text-decoration-underline">Id</h5>
        <h5 class="text-decoration-underline">Name</h5>
        <h5 class="text-decoration-underline">Type 1</h5>
        <h5 class="text-decoration-underline">Type 2</h5>
        <h5 class="text-decoration-underline">Egg Group</h5>
        <h5 class="text-decoration-underline">Main Color</h5>
    </div>
    <div id="node">
        <!-- Stockage des infos -->
        <p id="stockage"></p>
    </div>


</body>


</html>

<script src="script.js"></script>
